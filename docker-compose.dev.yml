version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newshub_db}
      POSTGRES_USER: ${POSTGRES_USER:-newshub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newshub_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newshub_user} -d ${POSTGRES_DB:-newshub_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SKIP_COLLECTSTATIC: "true"
    command: python manage.py runserver 0.0.0.0:5000
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: 5000
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0 
      SKIP_COLLECTSTATIC: "true"
      RUN_MIGRATIONS: "true"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SKIP_COLLECTSTATIC: "true"
    command: celery -A newshub_core worker --loglevel=info
    restart: always
    env_file:
      - .env
    environment:
      PORT: 5000
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      SKIP_COLLECTSTATIC: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SKIP_COLLECTSTATIC: "true"
    command: celery -A newshub_core beat --loglevel=info
    restart: always
    env_file:
      - .env
    environment:
      PORT: 5000
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      SKIP_COLLECTSTATIC: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data: