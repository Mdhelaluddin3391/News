x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      gunicorn newshub_core.asgi:application 
      -k uvicorn.workers.UvicornWorker 
      --workers 4 
      --bind 0.0.0.0:${PORT:-5000}
    restart: always
    init: true
    env_file:
      - .env
    expose:
      - "${PORT:-5000}"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A newshub_core worker --loglevel=info
    restart: always
    init: true
    env_file:
      - .env
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "rm -f /tmp/celerybeat.pid && celery -A newshub_core beat --loglevel=debug --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule"
    restart: always
    init: true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: always
    init: true
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    logging: *default-logging

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  static_volume:
  media_volume:
  postgres_data:
  redis_data: