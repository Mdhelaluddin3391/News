version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newshub_db}
      POSTGRES_USER: ${POSTGRES_USER:-newshub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newshub_user} -d ${POSTGRES_DB:-newshub_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "daphne -b 0.0.0.0 -p ${PORT:-5000} newshub_core.asgi:application"
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required for production}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "true"
      RUN_DEPLOY_CHECKS: "true"
      SKIP_COLLECTSTATIC: "false"
    expose:
      - "${PORT:-5000}"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A newshub_core worker --loglevel=info
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required for production}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      SKIP_COLLECTSTATIC: "true"
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A newshub_core beat --loglevel=info
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required for production}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      SKIP_COLLECTSTATIC: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    init: true
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    logging: *default-logging

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  static_volume:
  media_volume:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www: