version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    command: daphne -b 0.0.0.0 -p 8000 newshub_core.asgi:application
    restart: unless-stopped
    init: true
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: []
    # Yahan 'worker' ki jagah 'beat' chalega
    command: celery -A newshub_core beat --loglevel=info
    restart: unless-stopped
    init: true
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    init: true
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro 
      - ./frontend:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

volumes:
  static_volume:
  media_volume:
