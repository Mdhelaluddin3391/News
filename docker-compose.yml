version: '3.8'

services:
  # NAYA: PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: newshub_db
      POSTGRES_USER: newshub_user
      POSTGRES_PASSWORD: newshub_password
    volumes:
      - postgres_data:/var/lib/postgresql/data # Data delete hone se bachane ke liye
    # Isko bhi humne koi port (ports: - "5432:5432") nahi diya hai, ye completely private hai

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: news-backend/Dockerfile
    restart: always
    environment:
      # Backend ko DB credentials pass kar rahe hain
      POSTGRES_DB: newshub_db
      POSTGRES_USER: newshub_user
      POSTGRES_PASSWORD: newshub_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: news-backend/Dockerfile
    command: celery -A newshub_core worker --loglevel=info
    restart: always
    environment:
      POSTGRES_DB: newshub_db
      POSTGRES_USER: newshub_user
      POSTGRES_PASSWORD: newshub_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80" # System random port assign karega
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./news-website:/usr/share/nginx/html
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data: # NAYA: PostgreSQL data save rakhne ke liye volume