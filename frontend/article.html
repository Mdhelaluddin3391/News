<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Article - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">

    <!-- Primary Meta (JS will update these dynamically) -->
    <meta name="description" content="Read the latest breaking news and in-depth articles on Ferox Times.">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="author" content="Ferox Times">

    <!-- Open Graph (JS updates dynamically after article loads) -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Ferox Times">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:title" id="og-title" content="Article - Ferox Times">
    <meta property="og:description" id="og-description" content="Read the latest breaking news and in-depth articles on Ferox Times.">
    <meta property="og:image" id="og-image" content="https://www.feroxtimes.com/images/default-news.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@feroxtimes">
    <meta name="twitter:title" id="twitter-title" content="Article - Ferox Times">
    <meta name="twitter:description" id="twitter-description" content="Read the latest breaking news and in-depth articles on Ferox Times.">
    <meta name="twitter:image" id="twitter-image" content="https://www.feroxtimes.com/images/default-news.png">

    <!-- Canonical (set by JS after article slug is known) -->
    <link rel="canonical" id="canonical-url" href="">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canonicalOrigin = ['feroxtimes.com', 'www.feroxtimes.com'].includes(window.location.hostname)
                ? 'https://www.feroxtimes.com'
                : window.location.origin;
            const canonicalPath = window.location.pathname.replace(/\/+$/, '') || '/';
            document.getElementById("canonical-url")
                .setAttribute("href", canonicalOrigin + canonicalPath);
        });
    </script>

    <!-- Preconnects for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/article.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <div id="comment-feedback-toast" class="comment-feedback-toast" aria-live="polite"></div>

    <main class="container main-content">
        <div class="left-column">
            <div class="loader" id="loader"></div>
            <div class="error-message" id="error-message"></div>

            <article class="article-detail" id="article-detail">
            </article>
        </div>

        <div class="right-column">
            <section class="sidebar-section" id="poll-widget-section" style="display: none;">
                <h3 class="sidebar-title">POLL OF THE WEEK</h3>
                <div id="poll-container" class="poll-container">
                </div>
            </section>

           
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <template id="report-comment-modal-template">
        <div class="custom-modal-box report-modal-box">
            <h3>Report Flag</h3>
            <p class="report-modal-copy">Flag comments that are spam, abusive, or misleading. Our moderation team will review them.</p>
            <form id="report-form" class="report-form">
                <div class="report-form-group">
                    <label for="report-reason">Reason</label>
                    <select id="report-reason" required>
                        <option value="">Select a reason</option>
                        <option value="spam">Spam</option>
                        <option value="offensive">Offensive Language</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="harassment">Harassment</option>
                        <option value="false_info">False Information</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="report-form-group">
                    <label for="report-description">Additional Details</label>
                    <textarea id="report-description" rows="4" placeholder="Explain why you are flagging this comment."></textarea>
                </div>
                <div class="custom-modal-actions">
                    <button type="button" class="custom-modal-btn custom-modal-cancel" id="report-cancel-btn">Cancel</button>
                    <button type="submit" class="custom-modal-btn custom-modal-submit" id="report-submit-btn">Submit Flag</button>
                </div>
            </form>
        </div>
    </template>

    <script src="js/config.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/components/index-ui.js" defer></script>
    <script src="js/components/loadComponents.js" defer></script>
    <script src="js/components/comments.js" defer></script>
    <script src="js/components/related.js" defer></script>
    <script src="js/components/poll.js" defer></script>
    <script src="js/components/ad-manager.js" defer></script>
    <script src="js/pages/index.js" defer></script>
    <script src="js/pages/homepage.js" defer></script>
    <script src="js/pages/article.js" defer></script>
    <script src="js/pages/search.js" defer></script>
</body>

</html>
