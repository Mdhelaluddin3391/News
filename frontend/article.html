<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Article - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    
    <link rel="preconnect" href="https://www.feroxtimes.com" crossorigin>
    
    <meta name="description" content="Read the latest breaking news and in-depth articles on Ferox Times.">
    
    <meta property="og:title" content="Article - Ferox Times">
    <meta property="og:description" content="Read the latest breaking news and in-depth articles on Ferox Times.">
    <meta property="og:type" content="article">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Article - Ferox Times">
    
    <link rel="canonical" id="canonical-url" href="https://www.feroxtimes.com/">
    <script>
        // SEO: Dynamically update Canonical URL
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            document.getElementById('canonical-url').setAttribute('href', 'https://www.feroxtimes.com' + path);
        });
        // REMOVED the injectArticleSchema function from here
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/article.css">
    <link rel="stylesheet" href="css/search.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <div id="comment-feedback-toast" class="comment-feedback-toast" aria-live="polite"></div>

    <main class="container main-content">
        <div class="left-column">
            <div class="loader" id="loader"></div>
            <div class="error-message" id="error-message"></div>

            <article class="article-detail" id="article-detail">
            </article>
        </div>

        <div class="right-column">
            <section class="sidebar-section" id="poll-widget-section" style="display: none;">
                <h3 class="sidebar-title">POLL OF THE WEEK</h3>
                <div id="poll-container" class="poll-container">
                </div>
            </section>

           
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <template id="report-comment-modal-template">
        <div class="custom-modal-box report-modal-box">
            <h3>Report Flag</h3>
            <p class="report-modal-copy">Flag comments that are spam, abusive, or misleading. Our moderation team will review them.</p>
            <form id="report-form" class="report-form">
                <div class="report-form-group">
                    <label for="report-reason">Reason</label>
                    <select id="report-reason" required>
                        <option value="">Select a reason</option>
                        <option value="spam">Spam</option>
                        <option value="offensive">Offensive Language</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="harassment">Harassment</option>
                        <option value="false_info">False Information</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="report-form-group">
                    <label for="report-description">Additional Details</label>
                    <textarea id="report-description" rows="4" placeholder="Explain why you are flagging this comment."></textarea>
                </div>
                <div class="custom-modal-actions">
                    <button type="button" class="custom-modal-btn custom-modal-cancel" id="report-cancel-btn">Cancel</button>
                    <button type="submit" class="custom-modal-btn custom-modal-submit" id="report-submit-btn">Submit Flag</button>
                </div>
            </form>
        </div>
    </template>

    <script src="js/config.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/homepage.js" defer></script>
    <script src="js/loadComponents.js" defer></script>
    <script src="js/index-ui.js" defer></script>
    <script src="js/article.js" defer></script>
    <script src="js/comments.js" defer></script>
    <script src="js/related.js" defer></script>
    <script src="js/poll.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/ad-manager.js" defer></script>
</body>

</html>
