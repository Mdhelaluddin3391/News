    <meta property="og:image" content="https://www.feroxtimes.com/images/default-avatar.png">
    <link rel="canonical" id="canonical-url" href="">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canonicalOrigin = ['feroxtimes.com', 'www.feroxtimes.com'].includes(window.location.hostname)
                ? 'https://www.feroxtimes.com'
                : window.location.origin;
            const canonicalPath = window.location.pathname.replace(/\/+$/, '') || '/';
            document.getElementById("canonical-url")
                .setAttribute("href", canonicalOrigin + canonicalPath);
        });
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
