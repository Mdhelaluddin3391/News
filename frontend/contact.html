<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Get in touch with the Ferox Times editorial and support teams.">
    <link rel="canonical" href="https://www.feroxtimes.com/contact">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/search.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "mainEntity": {
        "@type": "Organization",
        "name": "Ferox Times",
        "email": "contact@feroxtimes.com",
        "telephone": "+91-98765-43210"
      }
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="page-main">
        <section class="page-shell">
            <div class="page-card">
                <div class="page-hero">
                    <span class="page-eyebrow">Contact</span>
                    <h1 class="page-title page-title--center">Contact Us</h1>
                    <p class="page-lead">Have a question, comment, or story tip? Send a message and the Ferox Times team will get back to you as soon as possible.</p>
                </div>

                <div class="page-content">
                    <form class="contact-form" id="contact-form" action="#" method="post">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>

                    <div class="page-cta-box">
                        <h2>Direct Email</h2>
                        <p>Alternatively, you can email us directly at <a href="mailto:contact@feroxtimes.com">contact@feroxtimes.com</a>.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script> 
    <script src="js/index-ui.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/contact.js"></script>
    <script src="js/search.js"></script>
    <script src="js/ad-manager.js"></script>
</body>
</html>
