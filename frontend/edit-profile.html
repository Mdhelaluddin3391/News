<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Update your Ferox Times account details, profile photo, and bio.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://www.feroxtimes.com/edit-profile">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/auth.css">
    <link rel="stylesheet" href="css/pages/edit-profile.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container edit-profile-box">
            <h1 class="auth-title">Edit Profile</h1>
            <div class="auth-success" id="edit-success"></div>
            <div class="auth-error" id="edit-error"></div>

            <form class="auth-form" id="edit-profile-form">
                <div class="form-group edit-profile-media">
                    <label class="edit-profile-media-label">Profile Picture</label>
                    <div class="edit-profile-preview-wrap">
                        <img id="profile-pic-preview" src="" alt="Profile Preview" class="edit-profile-preview">
                    </div>
                    <input type="file" id="edit-profile-pic" accept="image/*" class="edit-profile-file-input">
                </div>
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-email">Email Address (Cannot be changed)</label>
                    <input type="email" id="edit-email" disabled class="edit-profile-readonly">
                </div>
                <div class="form-group edit-profile-bio-group">
                    <label for="edit-bio">Bio</label>
                    <textarea id="edit-bio" rows="4" placeholder="Tell us about yourself..." class="edit-profile-bio"></textarea>
                </div>
                <hr class="edit-profile-divider">
                <p class="edit-profile-note">Leave password fields blank if you don't want to change
                    it.</p>
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-new-password">Confirm New Password</label>
                    <input type="password" id="confirm-new-password">
                </div>
                <button type="submit" class="auth-btn">Save Changes</button>
            </form>
            <p class="auth-link"><a href="/profile">Cancel & Go Back</a></p>
        </div>
    </main>
    <div id="footer-placeholder"></div>


    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/homepage.js"></script>
    <script src="js/pages/edit-profile.js"></script>
    <script src="js/pages/search.js"></script>
</body>

</html>
