<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferox Times - Premium News</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">

    <meta name="description"
        content="Stay updated with the latest breaking news, trending stories, and in-depth articles from around the world on Ferox Times.">

    <meta property="og:title" content="Ferox Times - Premium News">
    <meta property="og:description"
        content="Stay updated with the latest breaking news, trending stories, and in-depth articles from around the world on Ferox Times.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/default-news.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ferox Times - Premium News">
    
    <link rel="canonical" id="canonical-url" href="https://www.feroxtimes.com/">
    
    <link rel="alternate" type="application/rss+xml" title="Ferox Times RSS Feed" href="/rss/">
    
    <link rel="preconnect" href="https://api.feroxtimes.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/search.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="breaking">
        <div class="container breaking-flex">
            <div class="breaking-label">BREAKING</div>
            <div class="ticker">
                <span id="breaking-ticker-content">Loading...</span>
            </div>
        </div>
    </div>

    <main class="container main-content">
        <div class="left-column">
            <section class="featured-news">
                <div id="featured-news-container" class="featured-news-item">
                </div>
            </section>
            <section class="web-stories-section" style="margin-bottom: 40px;">
                <h3
                    style="font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); margin-bottom: 15px; border-left: 4px solid var(--secondary); padding-left: 10px;">
                    Web Stories (Shorts) <i class="fas fa-bolt"
                        style="color: #f59e0b; font-size: 1.1rem; margin-left: 5px;"></i>
                </h3>

                <div id="story-thumbnails-container" class="story-thumbnails-wrapper">
                </div>
            </section>

            <div id="story-modal" class="story-modal">
                <div class="story-modal-content">
                    <div class="story-progress-container">
                        <div id="story-progress-bar" class="story-progress-bar"></div>
                    </div>
                    <button id="close-story-btn" class="close-story-btn"><i class="fas fa-times"></i></button>

                    <div id="story-display" class="story-display">
                    </div>

                    <div class="story-nav left-tap" onclick="prevStory()"></div>
                    <div class="story-nav right-tap" onclick="nextStory()"></div>
                </div>
            </div>

            <section class="recent-news-section" id="recent-news-section" style="display: none; margin-bottom: 40px;">
                <h3
                    style="font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark); margin-bottom: 15px; border-left: 4px solid var(--secondary); padding-left: 10px;">
                    Latest News
                </h3>
                <div id="recent-news-container"
                    style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin;">
                </div>
            </section>



            <div id="home-categories-container"></div>
            <div class="loader" id="category-scroll-loader"
                style="display: none; margin: 30px auto; border-top-color: var(--secondary);"></div>


            <h1 class="category-heading" id="category-heading" style="display: none;">General News</h1>

            <div class="loader" id="loader"></div>

            <div class="articles-container" id="articles-container" style="display: none;"></div>

            <div class="pagination" id="pagination" style="display: none;">
                <button class="page-btn" id="prev-page" disabled>← Previous</button>
                <span class="page-info" id="page-info">Page 1</span>
                <button class="page-btn" id="next-page">Next →</button>
            </div>

            <div class="error-message" id="error-message"></div>
        </div>


        <div class="right-column">

            <section class="sidebar-section" id="top-stories-section">
                <h3 class="sidebar-title">TOP STORIES</h3>
                <div id="top-stories-container" class="trending-news">
                    <p style="color: var(--gray); font-size: 0.9rem;">Loading top stories...</p>
                </div>
            </section>

            <section class="sidebar-section" id="editors-picks-section">
                <h3 class="sidebar-title">EDITOR'S PICKS</h3>
                <div id="editors-picks-container" class="trending-news">
                    <p style="color: var(--gray); font-size: 0.9rem;">Loading picks...</p>
                </div>
            </section>

            <section class="sidebar-section" id="trending-section">
                <h3 class="sidebar-title">TRENDING NOW</h3>
                <div id="trending-container" class="trending-news">
                </div>
            </section>

            <section class="sidebar-section" id="categories-list-section">
                <h3 class="sidebar-title">CATEGORIES</h3>
                <ul id="categories-container" class="category-list">
                </ul>
            </section>

            <section class="sidebar-section" id="poll-widget-section" style="display: none;">
                <h3 class="sidebar-title">POLL OF THE WEEK</h3>
                <div id="poll-container" class="poll-container">
                </div>
            </section>

            <section class="sidebar-section" id="ad-section">
               <div id="ad-sidebar" class="ad-container" style="display: none; margin: 15px 0;"></div>
            </section>


            <section class="sidebar-section" id="newsletter-section">
                <div class="newsletter-form">
                    <h3>Stay Updated</h3>
                    <p>Subscribe to our newsletter for daily news updates.</p>
                    <form id="newsletterForm">
                        <input type="email" placeholder="Your email address" required>
                        <button type="submit">Subscribe Now</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/homepage.js" defer></script>
    <script src="js/index-ui.js" defer></script>
    <script src="js/loadComponents.js" defer></script>
    <script src="js/poll.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/push-notifications.js" defer></script>
    <script src="js/ad-manager.js" defer></script>
   <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsMediaOrganization",
  "name": "Ferox Times",
  "url": "https://www.feroxtimes.com",
  "logo": "https://www.feroxtimes.com/images/default-news.png",
  "sameAs": [
    "https://www.facebook.com/feroxtimes",
    "https://twitter.com/feroxtimes"
  ]
}
</script> 
</body>

</html>
