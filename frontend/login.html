<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/search.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Login to Ferox Times</h1>
            <div class="auth-error" id="login-error"></div>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                        <a href="/""
                            style="font-size: 0.9rem; color: var(--primary); text-decoration: none;">Forgot
                            Password?</a>
                    </div>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div style="text-align: center; margin: 1.5rem 0;">
                <p style="color: var(--gray); margin-bottom: 10px; font-size: 0.9rem;">OR</p>

                <div id="google-button-container" style="display: flex; justify-content: center;"></div>
            </div>
            <p class="auth-link">Don't have an account? <a href="/"">Register here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/login.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/search.js"></script>
    <script src="js/ad-manager.js"></script>
</body>

</html>
