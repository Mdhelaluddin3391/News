<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Access your Ferox Times account securely.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/login">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/auth.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Login to Ferox Times</h1>
            <div class="auth-error" id="login-error"></div>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <div class="auth-password-row">
                        <label for="password" class="auth-label-inline">Password</label>
                        <a href="/forgot-password" class="auth-inline-link">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div class="auth-alt-auth">
                <p class="auth-muted-copy">OR</p>

                <div id="google-button-container" class="auth-social-center"></div>
            </div>
            <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/homepage.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/search.js"></script>
</body>

</html>
