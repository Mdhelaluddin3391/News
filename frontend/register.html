<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Create a Ferox Times account to comment, save articles, and manage alerts.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/register">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/search.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Create an Account</h1>
            <div class="auth-error" id="register-error"></div>
            <div class="auth-success" id="register-success"></div>
            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>

            <div id="verification-next-steps" style="display: none; text-align: center; margin-top: 1.5rem;">
                <p style="color: var(--gray); margin-bottom: 0.75rem;">
                    We created your account for <strong id="verification-email"></strong>.
                </p>
                <p style="color: var(--gray); margin-bottom: 1rem;">
                    Check your inbox and spam folder, then open the verification page to activate your account.
                </p>
                <button type="button" class="auth-btn" id="open-verification-page">Open Verification Page</button>
                <p style="color: var(--gray); margin-top: 1rem; font-size: 0.95rem;">
                    Didn't get the email?
                    <a href="#" id="register-resend-link">Resend verification email</a>
                </p>
            </div>

            <div id="register-alt-auth" style="text-align: center; margin: 1.5rem 0;">
                <p style="color: var(--gray); margin-bottom: 10px; font-size: 0.9rem;">OR</p>

                <div id="google-button-container" style="display: flex; justify-content: center;"></div>
            </div>
            <p class="auth-link" id="register-login-link">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/homepage.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/register.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/search.js"></script>
    <script src="js/ad-manager.js"></script>
</body>

</html>
