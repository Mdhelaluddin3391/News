<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Create a Ferox Times account to comment, save articles, and manage alerts.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/register">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/auth.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Create an Account</h1>
            <div class="auth-error" id="register-error"></div>
            <div class="auth-success" id="register-success"></div>
            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>

            <div id="verification-next-steps" class="auth-next-steps" style="display: none;">
                <p class="auth-muted-copy auth-muted-copy--tight">
                    We created your account for <strong id="verification-email"></strong>.
                </p>
                <p class="auth-muted-copy auth-muted-copy--spaced">
                    Check your inbox and spam folder, then open the verification page to activate your account.
                </p>
                <button type="button" class="auth-btn" id="open-verification-page">Open Verification Page</button>
                <p class="auth-note">
                    Didn't get the email?
                    <a href="#" id="register-resend-link">Resend verification email</a>
                </p>
            </div>

            <div id="register-alt-auth" class="auth-alt-auth">
                <p class="auth-muted-copy">OR</p>

                <div id="google-button-container" class="auth-social-center"></div>
            </div>
            <p class="auth-link" id="register-login-link">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/homepage.js"></script>
    <script src="js/pages/register.js"></script>
    <script src="js/pages/search.js"></script>
</body>

</html>
