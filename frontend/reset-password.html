<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Choose a new password for your Ferox Times account.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/reset-password">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Set New Password</h1>
            <div class="auth-error" id="reset-error"></div>
            <div class="auth-success" id="reset-success"></div>
            <form class="auth-form" id="reset-form">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            <p class="auth-link"><a href="/login">Back to Login</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/homepage.js"></script> 
    <script src="js/pages/reset-password.js"></script>
    <script src="js/pages/search.js"></script>
</body>
</html>
