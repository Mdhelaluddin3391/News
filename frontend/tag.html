<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Tag Results - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    
    <link rel="preconnect" href="https://www.feroxtimes.com" crossorigin>
    
    <meta name="description" content="Browse news articles by specific topics and tags on Ferox Times.">
    
    <meta property="og:title" content="Tag Results - Ferox Times">
    <meta property="og:description" content="Browse news articles by specific topics and tags on Ferox Times.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.feroxtimes.com/images/default-news.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tag Results - Ferox Times">
    <link rel="canonical" id="canonical-url" href="">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canonicalOrigin = ['feroxtimes.com', 'www.feroxtimes.com'].includes(window.location.hostname)
                ? 'https://www.feroxtimes.com'
                : window.location.origin;
            const canonicalPath = window.location.pathname.replace(/\/+$/, '') || '/';
            document.getElementById("canonical-url")
                .setAttribute("href", canonicalOrigin + canonicalPath);
        });
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container main-content">
        <h1 class="category-heading" id="tag-heading">Articles tagged with #...</h1>
        <div class="loader" id="loader"></div>
        <div class="error-message" id="error-message"></div>
        
        <div class="articles-container" id="articles-container"></div>
        
        <div class="pagination" id="pagination" style="display: none;">
            <button class="page-btn" id="prev-page" disabled>← Previous</button>
            <span class="page-info" id="page-info">Page 1</span>
            <button class="page-btn" id="next-page">Next →</button>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js" defer></script>

    <script src="js/components/related.js" defer></script>
    <script src="js/components/poll.js" defer></script>
    <script src="js/components/ad-manager.js" defer></script>
    <script src="js/pages/index.js" defer></script>
