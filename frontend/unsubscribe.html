<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Manage or confirm your Ferox Times newsletter unsubscribe request.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/unsubscribe">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/pages.css">
    <link rel="stylesheet" href="css/pages/extra-pages.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
    <div class="page-container">
        <h1 class="page-title page-title--center">Unsubscribe from Newsletter</h1>

        <p class="unsubscribe-message">
            We're sorry to see you go! If you no longer wish to receive our daily news updates, please enter your email address below.
        </p>
        
        <div class="error-message unsubscribe-status" id="unsub-error" style="display:none;"></div>
        
        <div id="unsub-success" class="unsubscribe-status unsubscribe-status--success" style="display:none;">
            You have been successfully unsubscribed from our newsletter.
        </div>

        <form class="unsubscribe-form" id="unsubscribe-form">
            <div class="form-group" id="email-input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <button type="submit" class="submit-btn page-submit-full">
                Unsubscribe Me
            </button>
        </form>
    </div>
</main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/homepage.js"></script> 
    <script src="js/pages/unsubscribe.js"></script>
    
    <script src="js/pages/search.js"></script>
</body>
</html>
