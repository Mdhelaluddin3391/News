<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="description" content="Verify your email address to activate your Ferox Times account.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.feroxtimes.com/verify-email">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/breaking-news.css">
    <link rel="stylesheet" href="css/components/listing.css">
    <link rel="stylesheet" href="css/components/sidebar.css">
    <link rel="stylesheet" href="css/components/ads.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/poll.css">
    <link rel="stylesheet" href="css/components/live-badge.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/responsive.css">
    <link rel="stylesheet" href="css/components/search.css">
    <link rel="stylesheet" href="css/components/web-stories.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Verify Your Email</h1>
            <div class="auth-error" id="verify-error"></div>
            <div id="verify-success" class="auth-success auth-success--center" style="display: none;">
                <i class="fas fa-check-circle"></i> Email verified successfully! You can now login.
            </div>

            <div id="verify-form-container">
                <p class="auth-help-text">
                    A verification link has been sent to your email. Click the link in the email or enter the token below.
                </p>

                <form class="auth-form" id="verify-email-form">
                    <div class="form-group">
                        <label for="token">Verification Token</label>
                        <input type="text" id="token" name="token" placeholder="Paste the token from the email" required>
                    </div>
                    <button type="submit" class="auth-btn">Verify Email</button>
                </form>

                <p class="auth-note auth-note--centered">
                    Didn't receive the email? <a href="#" id="resend-btn" class="auth-inline-link auth-inline-link--underline">Resend Verification Email</a>
                </p>
            </div>

            <p class="auth-link auth-link--spaced">Already verified? <a href="/login">Login here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/index.js"></script>
    <script src="js/pages/verify-email.js"></script>
    <script src="js/pages/search.js"></script>
</body>

</html>
