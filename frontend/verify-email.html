<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/search.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="auth-container">
            <h1 class="auth-title">Verify Your Email</h1>
            <div class="auth-error" id="verify-error"></div>
            <div id="verify-success" style="display: none; color: green; background-color: #e8f5e9; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: center;">
                <i class="fas fa-check-circle"></i> Email verified successfully! You can now login.
            </div>

            <div id="verify-form-container">
                <p style="text-align: center; color: var(--gray); margin-bottom: 20px;">
                    A verification link has been sent to your email. Click the link in the email or enter the token below.
                </p>

                <form class="auth-form" id="verify-email-form">
                    <div class="form-group">
                        <label for="token">Verification Token</label>
                        <input type="text" id="token" name="token" placeholder="Paste the token from the email" required>
                    </div>
                    <button type="submit" class="auth-btn">Verify Email</button>
                </form>

                <p style="text-align: center; color: var(--gray); margin-top: 20px; font-size: 0.9rem;">
                    Didn't receive the email? <a href="#" id="resend-btn" style="color: var(--primary); cursor: pointer; text-decoration: underline;">Resend Verification Email</a>
                </p>
            </div>

            <p class="auth-link" style="margin-top: 30px;">Already verified? <a href="/login">Login here</a></p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/verify-email.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/search.js"></script>
    <script src="js/ad-manager.js"></script>
</body>

</html>
