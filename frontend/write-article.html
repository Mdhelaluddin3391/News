<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Article - Ferox Times</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Quill Rich Text Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/top-bar.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/toast.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/pages/pages.css">
    <style>
        .writer-container { max-width: 900px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid var(--primary); }
        .writer-header { margin-bottom: 25px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .writer-title { font-size: 2rem; color: #1e293b; margin: 0; }
        .writer-badge { background: #10b981; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1); }
        #editor-container { height: 400px; border-radius: 0 0 8px 8px; font-size: 1.1rem; }
        .ql-toolbar { border-radius: 8px 8px 0 0; background: #f8fafc; }
        .btn-submit { background-color: var(--primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; width: 100%; margin-top: 20px; }
        .btn-submit:hover { background-color: #b71c1c; }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .submit-notice { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="page-container">
        <div class="writer-container">
            <div class="writer-header">
                <h1 class="writer-title">Write Raw Article</h1>
                <span class="writer-badge"><i class="fas fa-check-circle"></i> Verified Writer</span>
            </div>
            
            <div id="status-message" style="display:none; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold;"></div>

            <form id="article-form">
                <div class="form-group">
                    <label for="article-title">Headline / Title <span style="color:red">*</span></label>
                    <input type="text" id="article-title" class="form-control" placeholder="Enter an attention-grabbing headline..." required minlength="10">
                </div>
                
                <div class="form-group">
                    <label for="article-category">Category <span style="color:red">*</span></label>
                    <select id="article-category" class="form-control" required>
                        <option value="">-- Select Category --</option>
                        <!-- Loaded dynamically -->
                    </select>
                </div>

                <div class="form-group">
                    <label>Article Content <span style="color:red">*</span></label>
                    <!-- Quill Toolbar and Editor -->
                    <div id="editor-container"></div>
                    <small style="color:#64748b; margin-top: 5px; display:inline-block;">Write the raw facts, quotes, and content. Our editorial team will format and SEO-optimize it before publishing.</small>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Submit for Editorial Review
                </button>
                <div class="submit-notice">
                    By submitting, you agree to our Editorial Guidelines. All submissions are saved as Drafts.
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/components/index-ui.js"></script>
    <script src="js/components/loadComponents.js"></script>
    <script src="js/components/ad-manager.js"></script>
    <script src="js/pages/write-article.js"></script>
</body>
</html>
