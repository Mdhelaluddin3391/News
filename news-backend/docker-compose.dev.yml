version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newshub_db}
      POSTGRES_USER: ${POSTGRES_USER:-newshub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newshub_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Local database access ke liye

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # NAYA: Sirf runserver chalayenge, migrate entrypoint kar dega
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .  # Updated path
      dockerfile: Dockerfile
    command: celery -A newshub_core worker --loglevel=info
    restart: always
    env_file:
      - .env  # Updated path
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - .:/app  # Updated path
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"  # <--- Direct port 80 pe chalega
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # Updated path
      - ../news-website:/usr/share/nginx/html  # Updated path (Points one folder back to reach frontend)
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data: