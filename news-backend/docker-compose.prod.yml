version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 newshub_core.asgi:application
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: celery -A newshub_core worker --loglevel=info
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    volumes:
      - media_volume:/app/media

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../news-website:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

volumes:
  static_volume:
  media_volume:
