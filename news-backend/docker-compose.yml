version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: newshub_db
      POSTGRES_USER: newshub_user
      POSTGRES_PASSWORD: newshub_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env  # Backend ko .env file se variables milenge
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A newshub_core worker --loglevel=info
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8000:80" 
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Frontend files ko Nginx ke default HTML folder me mount karein
      - ../news-website:/usr/share/nginx/html
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data: