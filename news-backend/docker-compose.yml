version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./news-backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate && 
             gunicorn newshub_core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2"
    restart: unless-stopped
    env_file:
      - ./news-backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./news-backend
      dockerfile: Dockerfile
    command: celery -A newshub_core worker --loglevel=warning
    restart: unless-stopped
    env_file:
      - ./news-backend/.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./news-backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./news-website:/usr/share/nginx/html # <--- Serve static HTML directly
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data: