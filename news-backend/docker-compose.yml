version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: daphne -b 0.0.0.0 -p 8000 newshub_core.asgi:application
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    command: celery -A newshub_core worker --loglevel=warning
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../news-website:/usr/share/nginx/html:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data:
