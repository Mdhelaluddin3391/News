# nginx/default.conf

# HTTP (Port 80) traffic to HTTPS redirect
server {
    listen 80;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Port 443) Server
server {
    listen 443 ssl;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    client_max_body_size 50M;

    # SSL Certificates paths
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # --- BOT DETECTION FOR SOCIAL MEDIA PREVIEW ---
    # Set flag if User-Agent is a known social media bot
    set $is_bot 0;
    
    # Facebook, WhatsApp, Twitter, LinkedIn, Telegram, Pinterest bots
    if ($http_user_agent ~* (facebookexternalhit|Twitterbot|WhatsApp|LinkedInBot|TelegramBot|Pinterestbot|Slurp|bingbot|Googlebot)) {
        set $is_bot 1;
    }

    # 1. Frontend Website with Bot Detection for Social Preview
    location / {
        # If it's a bot AND requesting article.html with ID parameter
        if ($is_bot = 1) {
            # Extract article ID from query string: ?id=123
            if ($args ~* id=(\d+)) {
                return 301 /api/articles/$1/share/;
            }
        }
        
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Django Backend (API, Admin, RSS, Sitemap)
    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 3. WebSocket Support
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Django Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # 5. User Uploaded Media Files
    location /media/ {
        alias /app/media/;
    }
}