# nginx/default.conf

# --- Social Preview Support Helpers ---
# Detect major social media link unfurlers once for all servers
map $http_user_agent $is_social_preview_bot {
    default 0;
    ~*(facebookexternalhit|facebot|twitterbot|WhatsApp|LinkedInBot|TelegramBot|Pinterestbot|Slackbot|SkypeUriPreview|vkShare|discordbot|previewbot) 1;
}

# Extract numeric article IDs from clean URLs like /news/123/my-story
map $uri $path_article_id {
    default "";
    ~^/(?:news|articles?)/(?:latest/)?(?<share_id>\d+)[^/]*(?:/|$) $share_id;
}

# Extract article IDs from query strings such as article.html?id=123
map $arg_id $query_article_id {
    default "";
    ~^(?<share_id>\d+)$ $share_id;
}

# HTTP (Port 80) traffic to HTTPS redirect
server {
    listen 80;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Port 443) Server
server {
    listen 443 ssl;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    client_max_body_size 50M;

    # SSL Certificates paths
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 1. Frontend Website with Social Preview rewrites
    location / {
        # Prefer IDs derived from path (e.g., /news/123/slug)
        set $share_article_id $path_article_id;

        # Fallback to query parameter ?id=123 when path does not include the ID
        if ($share_article_id = "") {
            set $share_article_id $query_article_id;
        }

        # Known social bots should see the Django share endpoint for rich OG tags
        if ($is_social_preview_bot = 1) {
            if ($share_article_id != "") {
                rewrite ^ /api/news/articles/$share_article_id/share/ last;
            }
        }
        
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Django Backend (API, Admin, RSS, Sitemap)
    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 3. WebSocket Support
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. Django Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # 5. User Uploaded Media Files
    location /media/ {
        alias /app/media/;
    }
}
