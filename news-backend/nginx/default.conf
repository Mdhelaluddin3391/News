# nginx/default.conf

# HTTP (Port 80) traffic ne HTTPS par redirect karva mate
server {
    listen 80;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Port 443) Server
server {
    listen 443 ssl;
    server_name dharmanagarlive.com www.dharmanagarlive.com;
    client_max_body_size 50M;

    # SSL Certificates na paths (Aa certificates Let's Encrypt thi generate karva padse)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # 1. Frontend Website Serve Karega
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Django Backend (API, Admin, RSS, Sitemap)
    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # NAYA: HTTPS protocol pass karva mate
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Django Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # 4. User Uploaded Media Files
    location /media/ {
        alias /app/media/;
    }
}