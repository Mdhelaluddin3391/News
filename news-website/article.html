<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - NewsHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/article.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="loader" id="loader"></div>
        <div class="error-message" id="error-message"></div>
        <article class="article-detail" id="article-detail">

            <section class="sidebar-section">
                <div id="sidebar-sticky-ad" class="ad-slot" style="position: sticky; top: 20px; display: none;"></div>
                </div>
            </section>

            <div id="article-top-ad" class="ad-slot ad-banner" style="display: none;"></div>

            <!-- Social Sharing Buttons -->
            <div class="social-share">
                <h3>Share this article</h3>
                <div class="share-buttons" id="share-buttons"></div>
            </div>

            <!-- Related Articles -->
            <section class="related-articles">
                <h3>Related Articles</h3>
                <div class="related-container" id="related-container"></div>
            </section>

            <!-- Comments Section -->
            <section class="comments-section">
                <h3>Comments</h3>
                <div id="comments-list"></div>
                <div id="comment-form-container"></div>
            </section>
        </article>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/index-ui.js"></script>
    <script src="js/loadComponents.js"></script>
    <script src="js/article.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/related.js"></script>
</body>

</html>
