# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# --- SOCIAL SHARE BOT MAPS ---
map $http_user_agent $is_social_preview_bot {
    default 0;
    ~*(facebookexternalhit|facebot|twitterbot|WhatsApp|LinkedInBot|TelegramBot|Pinterestbot|Slackbot|SkypeUriPreview|vkShare|discordbot|previewbot) 1;
}

map $uri $path_article_id {
    default "";
    ~^/(?:news|articles?)/(?:latest/)?(?<share_slug>[\w-]+)[^/]*(?:/|$) $share_slug;
}

map $arg_slug $query_article_id {
    default "";
    ~^(?<share_slug>[\w-]+)$ $share_slug;
}

map $path_article_id $resolved_article_id {
    default $path_article_id;
    "" $query_article_id;
}

map "$is_social_preview_bot:$resolved_article_id" $social_share_path {
    default "";
    ~^1:([\w-]+)$ /api/news/articles/$1/share/;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}
# ------------------------------

# HTTP Server - Redirects to HTTPS and handles Certbot validation
server {
    listen 80;
    server_name feroxtimes.com www.feroxtimes.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name feroxtimes.com www.feroxtimes.com admin.feroxtimes.com;
    
    server_tokens off;
    client_max_body_size 50M;

    if ($host = "admin.feroxtimes.com") {
        rewrite ^/$ /admin/ permanent;
    }

    # SSL Configuration 
    ssl_certificate /etc/letsencrypt/live/feroxtimes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/feroxtimes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # GZIP
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 1. HTML se clean URLs par redirect (e.g. /article.html -> /article)
    if ($request_uri ~ ^/(.*)\.html$) {
        return 301 /$1;
    }

    # --- NAYA ADD KIYA GAYA CODE SHURU ---
    # Specific Routing for Article, Author, Tag, Category pages
    location ~ ^/(?<page>article|author|tag)(?:/[^/]+)?$ {
        root /usr/share/nginx/html;
        try_files /$page.html =404;
    }

    location ~ ^/category/[^/]+$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
    # --- NAYA ADD KIYA GAYA CODE KHATAM ---

    # 2. Main Frontend Routing with Social Share logic
    location / {
        if ($social_share_path != "") {
            rewrite ^ $social_share_path last;
        }

        root /usr/share/nginx/html;
        index index.html;
        
        # SPA Dynamic Routing fallback to index.html (MIME Type Fix)
        try_files $uri $uri/ $uri.html /index.html;
    }

    # 3. Static Frontend Files (CSS, JS, Images) ke liye strict 404
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        try_files $uri =404; 
    }

    # 4. Health Check
    location = /health/ {
        proxy_pass http://backend:5000/health/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # 5. APIs aur Admin (Port 5000 as per docker-compose.prod.yml)
    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:5000;
        proxy_read_timeout 300;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # 6. WebSockets (Channels)
    location /ws/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_read_timeout 300;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # 7. Django Static
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 8. Django Media
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Custom 404 Page Error Handling
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}