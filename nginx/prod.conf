map $http_user_agent $is_social_preview_bot {
    default 0;
    ~*(facebookexternalhit|facebot|twitterbot|WhatsApp|LinkedInBot|TelegramBot|Pinterestbot|Slackbot|SkypeUriPreview|vkShare|discordbot|previewbot) 1;
}

map $uri $path_article_id {
    default "";
    ~^/(?:news|articles?)/(?:latest/)?(?<share_slug>[\w-]+)[^/]*(?:/|$) $share_slug;
}

map $arg_slug $query_article_id {
    default "";
    ~^(?<share_slug>[\w-]+)$ $share_slug;
}

map $path_article_id $resolved_article_id {
    default $path_article_id;
    "" $query_article_id;
}

map "$is_social_preview_bot:$resolved_article_id" $social_share_path {
    default "";
    ~^1:([\w-]+)$ /api/news/articles/$1/share/;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name feroxtimes.com www.feroxtimes.com;
    client_max_body_size 50M;

    location = /health/ {
        proxy_pass http://backend:8000/health/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location / {
        if ($social_share_path != "") {
            rewrite ^ $social_share_path last;
        }

        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        proxy_pass http://backend:8000;
        proxy_read_timeout 300;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 300;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}
