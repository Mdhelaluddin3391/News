map $http_user_agent $is_social_preview_bot {
    default 0;
    ~*(facebookexternalhit|facebot|twitterbot|WhatsApp|LinkedInBot|TelegramBot|Pinterestbot|Slackbot|SkypeUriPreview|vkShare|discordbot|previewbot) 1;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

map $uri $path_article_id {
    default "";
    ~^/(?:news|articles?)/(?:latest/)?(?<share_slug>[\w-]+)[^/]*(?:/|$) $share_slug;
}

map $arg_slug $query_article_id {
    default "";
    ~^(?<share_slug>[\w-]+)$ $share_slug;
}

map $path_article_id $resolved_article_id {
    default $path_article_id;
    "" $query_article_id;
}

map "$is_social_preview_bot:$resolved_article_id" $social_share_path {
    default "";
    ~^1:([\w-]+)$ /api/news/articles/$1/share/;
}

# HTTP Server - Redirects to HTTPS and handles Certbot validation
server {
    listen 80;
    server_name feroxtimes.com www.feroxtimes.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name feroxtimes.com www.feroxtimes.com;
    absolute_redirect off;
    client_max_body_size 50M;
    server_tokens off;

    # SSL Configuration (Populated automatically by init script)
    ssl_certificate /etc/letsencrypt/live/feroxtimes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/feroxtimes.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # GZIP
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Custom Redirects
    if ($uri ~ ^(?<legacy_path>/.*)\.html$) {
        return 301 $legacy_path$is_args$args;
    }

    if ($uri ~ ^(?<clean_path>/(?:404|about|advertise|authors|careers|contact|cookie-policy|edit-profile|faq|forgot-password|login|privacy|profile|register|reset-password|saved|search|terms|unsubscribe|verify-email|article(?:/[^/]+)?|author(?:/[^/]+)?|category/[^/]+|tag(?:/[^/]+)?))/+$) {
        return 301 $clean_path$is_args$args;
    }

    location / {
        if ($social_share_path != "") {
            rewrite ^ $social_share_path last;
        }
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    location ~ ^/(?<page>article|author|tag)(?:/[^/]+)?$ {
        root /usr/share/nginx/html;
        try_files /$page.html =404;
    }

    location ~ ^/category/[^/]+$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location ~ ^/health(/db/|/redis/|/)?$ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(api|admin|tinymce|rss|sitemap\.xml) {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend:5000;
        proxy_read_timeout 300;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_read_timeout 300;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}